<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SlipPilot Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0f0a;color:#fff;min-height:100vh;padding:20px}
.card{background:#111811;border:1px solid #1e2e1e;border-radius:12px;padding:24px;margin-bottom:16px}
h1{font-size:24px;margin-bottom:4px;color:#00c853}
h2{font-size:16px;margin-bottom:12px;color:#fff}
.sub{font-size:13px;color:#8a9e8a;margin-bottom:24px}
.qs-bar{display:flex;gap:24px;flex-wrap:wrap;padding:14px 20px;align-items:center}
.qs-item{text-align:center}
.qs-val{font-size:22px;font-weight:900;color:#00c853}
.qs-lbl{font-size:10px;color:#8a9e8a;text-transform:uppercase}
input,button,select{font-family:inherit}
input[type=password],input[type=text],input[type=date]{padding:10px 14px;border-radius:8px;border:1px solid #1e2e1e;background:#0a0f0a;color:#fff;font-size:13px;outline:none}
input:focus{border-color:#00c853}
.btn{padding:10px 24px;border-radius:100px;border:none;background:#00c853;color:#fff;font-weight:600;cursor:pointer;font-size:14px}
.btn:hover{background:#1ed760}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:5px 12px;font-size:11px;border-radius:100px;border:1px solid #1e2e1e;background:transparent;color:#8a9e8a;cursor:pointer}
.btn-sm:hover{border-color:#00c853;color:#00c853}
.pill{padding:6px 14px;border-radius:100px;border:1px solid #1e2e1e;background:transparent;color:#8a9e8a;font-size:11px;font-weight:600;cursor:pointer}
.pill:hover{border-color:#00c853;color:#fff}
.pill.active{background:#00c853;color:#fff;border-color:#00c853}
.tab-row{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid #1e2e1e;padding-bottom:8px;flex-wrap:wrap}
.tab-btn{padding:6px 16px;border-radius:100px;border:1px solid #1e2e1e;background:transparent;color:#8a9e8a;font-size:12px;font-weight:600;cursor:pointer}
.tab-btn.active{background:#00c853;color:#fff;border-color:#00c853}
.tab-content{display:none}.tab-content.active{display:block}
.punter-card{background:#111811;border:1px solid #1e2e1e;border-radius:12px;margin-bottom:12px;overflow:hidden}
.punter-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer}
.punter-header:hover{background:rgba(0,200,83,.02)}
.rank-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.rank-1{background:rgba(255,179,0,.15);color:#ffb300;border:2px solid #ffb300}
.rank-2{background:rgba(192,192,192,.1);color:#c0c0c0;border:2px solid #c0c0c0}
.rank-3{background:rgba(205,127,50,.1);color:#cd7f32;border:2px solid #cd7f32}
.rank-n{background:rgba(138,158,138,.1);color:#8a9e8a;border:2px solid #1e2e1e}
.trust-ring{margin-left:auto;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.punter-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:0;padding:0 20px 12px;text-align:center}
.ps-val{font-size:18px;font-weight:800}.ps-lbl{font-size:9px;color:#8a9e8a;text-transform:uppercase}
.code-section{border-top:1px solid #1e2e1e;padding:12px 20px}
.code-grid{display:grid;grid-template-columns:100px 80px 55px 45px 45px 45px 55px 80px;gap:0 10px;align-items:center;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.code-grid:last-child{border-bottom:none}
.code-grid.hdr{color:#8a9e8a;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #1e2e1e;padding-bottom:8px}
.code-val{font-family:'JetBrains Mono',monospace;font-weight:800;color:#00c853;letter-spacing:1px}
.add-form{display:flex;gap:8px;align-items:center;padding:12px 20px;border-top:1px solid #1e2e1e;flex-wrap:wrap}
.add-form input{max-width:140px}
.gen-grid{display:grid;grid-template-columns:80px 90px 60px 100px 1fr;gap:0 12px;align-items:center;font-size:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.gen-grid.hdr{color:#8a9e8a;font-size:10px;font-weight:700;text-transform:uppercase;border-bottom:1px solid #1e2e1e}
.gen-actions{display:flex;gap:6px}
.gen-actions a{color:#8a9e8a;text-decoration:none;font-size:11px;padding:3px 8px;border:1px solid #1e2e1e;border-radius:6px}
.gen-actions a:hover{color:#00c853;border-color:#00c853}
.ticket-card{background:#0a0f0a;border:1px solid #1e2e1e;border-radius:8px;padding:16px;margin-bottom:10px}
.ticket-meta{font-size:11px;color:#8a9e8a;margin-bottom:6px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ticket-msg{font-size:13px;color:#ccc;line-height:1.5;margin:8px 0}
.ticket-badge{padding:2px 10px;border-radius:100px;font-size:10px;font-weight:700}
.badge-new{background:rgba(0,200,83,.1);color:#00c853}
.badge-done{background:rgba(138,158,138,.1);color:#8a9e8a}
.progress{font-size:13px;color:#ffb300;padding:8px 0}
#login{max-width:400px;margin:80px auto;text-align:center}
#login input{width:100%;max-width:300px;margin-bottom:12px}
#dashboard{display:none}
</style>
</head>
<body>
<div id="login" class="card">
  <h1>SlipPilot Admin</h1>
  <p class="sub">Enter your password to continue</p>
  <input type="password" id="pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()" />
  <br><button class="btn" onclick="doLogin()">Login</button>
  <p id="loginErr" style="color:#e53935;margin-top:8px;font-size:13px"></p>
</div>

<div id="dashboard">
  <h1>SlipPilot Admin</h1>
  <p class="sub"><a href="/" style="color:#00c853">Home</a> &middot; <a href="/admin/logout" style="color:#8a9e8a">Logout</a></p>

  <div class="card" style="padding:14px 20px">
    <div class="qs-bar">
      <div class="qs-item"><div class="qs-val" id="qsPunters">0</div><div class="qs-lbl">Punters</div></div>
      <div class="qs-item"><div class="qs-val" id="qsCodes">0</div><div class="qs-lbl">Codes Today</div></div>
      <div class="qs-item"><div class="qs-val" id="qsTickets" style="color:#ffb300">0</div><div class="qs-lbl">Tickets</div></div>
      <div class="qs-item"><div class="qs-val" id="qsBest">-</div><div class="qs-lbl">Best Trust</div></div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" data-tab="punters" onclick="switchAdminTab('punters')">Leaderboard</button>
    <button class="tab-btn" data-tab="codes" onclick="switchAdminTab('codes')">Codes</button>
    <button class="tab-btn" data-tab="tickets" onclick="switchAdminTab('tickets')">Tickets <span id="ticketBadge" style="background:#e53935;color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;margin-left:4px;display:none">0</span></button>
  </div>

  <!-- LEADERBOARD -->
  <div class="tab-content active" id="tab-punters">
    <div class="card" style="margin-bottom:12px">
      <h2>Today's Punter Codes</h2>
      <p style="font-size:11px;color:#8a9e8a;margin-bottom:12px">Update each punter's daily booking code here. Saved instantly.</p>
      <div id="punterCodesEditor"></div>
      <button class="btn" onclick="savePunterCodes()" style="margin-top:12px" id="saveCodesBtn">Save All Codes</button>
      <span id="saveCodesMsg" style="font-size:12px;color:#00c853;margin-left:8px"></span>
    </div>
    <div class="card">
      <h2>Punter Network</h2>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px" id="sortPills">
        <button class="pill active" onclick="sortBy('consistency',this)">Consistency</button>
        <button class="pill" onclick="sortBy('trust',this)">Trust</button>
        <button class="pill" onclick="sortBy('hitrate',this)">Hit Rate</button>
        <button class="pill" onclick="sortBy('games',this)">Games</button>
      </div>
      <div id="punterCards"></div>
    </div>
  </div>

  <!-- GENERATED CODES -->
  <div class="tab-content" id="tab-codes">
    <div class="card">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
        <h2 style="margin:0">Generated Codes</h2>
        <button class="btn-sm" onclick="copyAllCodes()">Copy All</button>
        <button class="btn-sm" onclick="exportCodes()">Export .txt</button>
      </div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
        <button class="pill active" onclick="filterGroup('all',this)">All</button>
        <button class="pill" onclick="filterGroup('A',this)">Safe</button>
        <button class="pill" onclick="filterGroup('B',this)">Balanced</button>
        <button class="pill" onclick="filterGroup('C',this)">Value</button>
        <button class="pill" onclick="filterGroup('D',this)">Consensus</button>
        <button class="pill" onclick="filterGroup('F',this)">Permutation</button>
      </div>
      <div id="codesTable"></div>
    </div>
  </div>

  <!-- TICKETS -->
  <div class="tab-content" id="tab-tickets">
    <div class="card">
      <h2>Support Tickets &amp; Messages</h2>
      <div id="ticketsList"><p style="color:#8a9e8a">Loading tickets...</p></div>
    </div>
  </div>
</div>

<script>
let adminPw='', profiles={}, generatedCodes={}, currentSort='consistency', currentGroup='all';

function switchAdminTab(id) {
  document.querySelectorAll('.tab-row .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + id));
}

async function doLogin() {
  const pw = document.getElementById('pw').value;
  const r = await fetch('/admin/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw})});
  if (r.ok) { adminPw = pw; document.getElementById('login').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; loadAll(); }
  else document.getElementById('loginErr').textContent = 'Wrong password';
}

async function loadAll() {
  const h = {'x-admin-password': adminPw};
  try { const r = await fetch('/api/punter-profiles', {headers:h}); if (r.ok) profiles = await r.json(); } catch {}
  try { const r = await fetch('/api/generated-codes', {headers:h}); if (r.ok) generatedCodes = await r.json(); } catch {}
  renderPunters();
  renderCodes();
  loadTickets();
  loadPunterCodes();
  updateQuickStats();
}

function updateQuickStats() {
  const pList = Object.values(profiles);
  document.getElementById('qsPunters').textContent = pList.length;
  const totalCodes = Object.values(generatedCodes).flat().filter(c => c && c.code).length;
  document.getElementById('qsCodes').textContent = totalCodes;
  const best = [...pList].sort((a,b) => b.trustScore - a.trustScore)[0];
  if (best) document.getElementById('qsBest').textContent = best.name + ' ' + best.trustScore;
}

// ── LEADERBOARD ──

function sortBy(method, btn) {
  currentSort = method;
  document.querySelectorAll('#sortPills .pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderPunters();
}

function getSorted() {
  let list = Object.values(profiles);
  switch (currentSort) {
    case 'trust': list.sort((a,b) => b.trustScore - a.trustScore); break;
    case 'hitrate': list.sort((a,b) => b.hitRate - a.hitRate); break;
    case 'games': list.sort((a,b) => b.totalGames - a.totalGames); break;
    case 'consistency': default: list.sort((a,b) => (b.consistency||0) - (a.consistency||0)); break;
  }
  return list;
}

function renderPunters() {
  const sorted = getSorted();
  if (!sorted.length) { document.getElementById('punterCards').innerHTML = '<p style="color:#8a9e8a">No punter profiles loaded.</p>'; return; }
  document.getElementById('punterCards').innerHTML = sorted.map((p, i) => {
    const rc = i===0 ? 'rank-1' : i===1 ? 'rank-2' : i===2 ? 'rank-3' : 'rank-n';
    const ringBg = p.trustScore >= 80 ? 'rgba(0,200,83,.12)' : p.trustScore >= 60 ? 'rgba(255,179,0,.1)' : 'rgba(229,57,53,.1)';
    const ringC = p.trustScore >= 80 ? '#00c853' : p.trustScore >= 60 ? '#ffb300' : '#e53935';
    const codes = (p.codes || []).filter(c => c.games > 0);
    return `<div class="punter-card">
      <div class="punter-header" onclick="this.parentElement.querySelector('.code-section').classList.toggle('collapsed')">
        <div class="rank-badge ${rc}">${i+1}</div>
        <div><div style="font-weight:800;font-size:15px">${esc(p.name)}</div><div style="font-size:12px;color:#8a9e8a">${esc(p.handle||'')}</div></div>
        <div class="trust-ring" style="background:${ringBg};border:2px solid ${ringC};color:${ringC}">${p.trustScore}</div>
      </div>
      <div class="punter-stats">
        <div><div class="ps-val">${codes.length}</div><div class="ps-lbl">Slips</div></div>
        <div><div class="ps-val">${p.totalGames}</div><div class="ps-lbl">Games</div></div>
        <div><div class="ps-val" style="color:#00c853">${p.won||0}</div><div class="ps-lbl">Won</div></div>
        <div><div class="ps-val" style="color:#e53935">${p.lost||0}</div><div class="ps-lbl">Lost</div></div>
        <div><div class="ps-val">${p.void||0}</div><div class="ps-lbl">Void</div></div>
        <div><div class="ps-val" style="color:#00c853">${p.hitRate}%</div><div class="ps-lbl">Hit Rate</div></div>
      </div>
      <div class="code-section">
        <div class="code-grid hdr"><span>CODE</span><span>DATE</span><span>GAMES</span><span>WON</span><span>LOST</span><span>VOID</span><span>RATE</span><span></span></div>
        ${codes.map(c => {
          const d = c.date ? new Date(c.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '-';
          const rc = c.hitRate >= 75 ? '#00c853' : c.hitRate >= 60 ? '#ffb300' : '#e53935';
          return `<div class="code-grid"><span class="code-val">${esc(c.code)}</span><span style="color:#8a9e8a">${d}</span><span>${c.games}</span><span style="color:#00c853">${c.won}</span><span style="color:#e53935">${c.lost}</span><span>${c.void||0}</span><span style="color:${rc};font-weight:700">${c.hitRate}%</span><span><button class="btn-sm" onclick="event.stopPropagation();navigator.clipboard.writeText('${esc(c.code)}');this.textContent='OK';setTimeout(()=>this.textContent='Copy',1000)">Copy</button></span></div>`;
        }).join('')}
      </div>
      <div class="add-form">
        <input type="text" placeholder="Add code" id="ac_${i}" />
        <input type="date" value="${new Date().toISOString().slice(0,10)}" id="ad_${i}" />
        <button class="btn-sm" onclick="addCode('${esc(p.name)}',${i})">Add</button>
        <span id="am_${i}" style="font-size:11px;color:#8a9e8a"></span>
      </div>
    </div>`;
  }).join('');
}

async function addCode(name, idx) {
  const code = document.getElementById('ac_'+idx).value.trim().toUpperCase();
  const date = document.getElementById('ad_'+idx).value;
  const msg = document.getElementById('am_'+idx);
  if (!code) return;
  msg.textContent = 'Scanning...';
  try {
    const r = await fetch('/api/punters/'+encodeURIComponent(name)+'/add-code', {method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPw}, body:JSON.stringify({code,date})});
    const j = await r.json();
    if (j.success) { msg.textContent = j.won+'W/'+j.lost+'L/'+j.void+'V ('+j.hitRate+'%)'; msg.style.color='#00c853'; setTimeout(()=>loadAll(), 1000); }
    else { msg.textContent = j.error || 'Failed'; msg.style.color='#e53935'; }
  } catch(e) { msg.textContent = e.message; msg.style.color='#e53935'; }
}

// ── GENERATED CODES ──

function filterGroup(g, btn) {
  currentGroup = g;
  btn.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderCodes();
}

function renderCodes() {
  const labels = {A:'Safe',B:'Balanced',C:'Value',D:'Consensus',E:'Moonshot',F:'Permutation',G:'Merge',H:'2-Punter'};
  let html = '<div class="gen-grid hdr"><span>GROUP</span><span>CODE</span><span>GAMES</span><span>ODDS</span><span></span></div>';
  let count = 0;
  for (const [key, codes] of Object.entries(generatedCodes)) {
    if (currentGroup !== 'all' && currentGroup !== key) continue;
    (codes||[]).filter(c => c && c.code).forEach(c => {
      count++;
      const oddsStr = c.odds >= 1e6 ? (c.odds/1e6).toFixed(1)+'M' : c.odds >= 1000 ? Math.round(c.odds/1000)+'K' : Math.round(c.odds);
      html += `<div class="gen-grid"><span style="color:#8a9e8a">${labels[key]||key}</span><span style="font-family:monospace;font-weight:800;color:#00c853;letter-spacing:1px">${c.code}</span><span>${c.games}g</span><span style="color:#ffb300;font-weight:700">${oddsStr}x</span><span class="gen-actions"><button class="btn-sm" onclick="navigator.clipboard.writeText('${c.code}');this.textContent='OK';setTimeout(()=>this.textContent='Copy',1000)">Copy</button><a href="https://www.sportybet.com/ng/?shareCode=${c.code}" target="_blank">Load &#8599;</a></span></div>`;
    });
  }
  if (!count) html += '<p style="color:#8a9e8a;padding:12px 0">No codes generated yet.</p>';
  document.getElementById('codesTable').innerHTML = html;
}

function copyAllCodes() {
  const codes = Object.values(generatedCodes).flat().filter(c => c && c.code).map(c => c.code);
  navigator.clipboard.writeText(codes.join('\n'));
  alert(codes.length + ' codes copied');
}

function exportCodes() {
  const text = Object.entries(generatedCodes).map(([k,codes]) => 'GROUP '+k+':\n'+(codes||[]).filter(c=>c&&c.code).map(c=>c.code+' ('+c.games+'g, '+Math.round(c.odds)+'x)').join('\n')).join('\n\n');
  const blob = new Blob([text],{type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'codes-today.txt'; a.click();
}

// ── TICKETS ──

async function loadTickets() {
  try {
    const r = await fetch('/api/support', {headers:{'x-admin-password':adminPw}});
    const j = await r.json();
    const tickets = (j.tickets || []).reverse();
    const newCount = tickets.filter(t => t.status === 'New').length;
    document.getElementById('qsTickets').textContent = newCount;
    const badge = document.getElementById('ticketBadge');
    if (newCount > 0) { badge.textContent = newCount; badge.style.display = 'inline'; } else { badge.style.display = 'none'; }
    if (!tickets.length) { document.getElementById('ticketsList').innerHTML = '<p style="color:#8a9e8a">No tickets yet. Users can submit via the ? button on the main site.</p>'; return; }
    document.getElementById('ticketsList').innerHTML = tickets.map(t => {
      const bc = t.status === 'New' ? 'badge-new' : 'badge-done';
      return `<div class="ticket-card">
        <div class="ticket-meta">
          <span><strong>${esc(t.name||'Anonymous')}</strong></span>
          <span>${esc(t.email||'')}</span>
          <span>${esc(t.type||'')}</span>
          <span>${new Date(t.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
          <span class="ticket-badge ${bc}">${t.status}</span>
        </div>
        <div class="ticket-msg">${esc(t.message||'')}</div>
        <div style="display:flex;gap:6px">
          ${t.email ? '<a href="mailto:'+esc(t.email)+'" class="btn-sm" style="text-decoration:none">Reply</a>' : ''}
          <button class="btn-sm" onclick="markTicket(${t.id},'Done')">Mark Done</button>
        </div>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('ticketsList').innerHTML = '<p style="color:#e53935">Failed to load: '+esc(e.message)+'</p>'; }
}

async function markTicket(id, status) {
  await fetch('/api/support/'+id, {method:'PATCH', headers:{'Content-Type':'application/json','x-admin-password':adminPw}, body:JSON.stringify({status})});
  loadTickets();
}

// ── PUNTER CODES ──

let punterCodes = {};

async function loadPunterCodes() {
  try {
    const r = await fetch('/api/admin/punter-codes', {headers:{'x-admin-password':adminPw}});
    if (r.ok) punterCodes = await r.json();
  } catch {}
  renderPunterCodesEditor();
}

function renderPunterCodesEditor() {
  const el = document.getElementById('punterCodesEditor');
  const names = Object.keys(punterCodes);
  if (!names.length) { el.innerHTML = '<p style="color:#8a9e8a">No punters configured.</p>'; return; }
  el.innerHTML = names.map(name =>
    `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04)"><span style="min-width:110px;font-size:13px;font-weight:600">${esc(name)}</span><input type="text" value="${esc(punterCodes[name]||'')}" id="pc_${name.replace(/\s/g,'_')}" style="flex:1;max-width:140px;text-transform:uppercase;font-family:monospace;font-weight:700;letter-spacing:1px" placeholder="CODE" /></div>`
  ).join('');
}

async function savePunterCodes() {
  const updated = {};
  for (const name of Object.keys(punterCodes)) {
    const el = document.getElementById('pc_' + name.replace(/\s/g, '_'));
    updated[name] = el ? el.value.trim().toUpperCase() : '';
  }
  try {
    const r = await fetch('/api/admin/punter-codes', {method:'POST', headers:{'Content-Type':'application/json','x-admin-password':adminPw}, body:JSON.stringify(updated)});
    const j = await r.json();
    if (j.success) { punterCodes = j.codes; document.getElementById('saveCodesMsg').textContent = 'Saved!'; setTimeout(()=>document.getElementById('saveCodesMsg').textContent='', 2000); }
  } catch(e) { document.getElementById('saveCodesMsg').textContent = 'Error: ' + e.message; }
}

function esc(s) { const e = document.createElement('span'); e.textContent = s || ''; return e.innerHTML; }
</script>
</body>
</html>
